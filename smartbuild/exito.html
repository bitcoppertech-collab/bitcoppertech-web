<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificación Exitosa | BIM-Pay OS</title>
    <style>
        body { 
            background: #0a192f; 
            color: #ccd6f6; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #112240; 
            padding: 50px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid #64ffda; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            max-width: 450px;
        }
        h1 { color: #64ffda; margin-bottom: 20px; font-size: 24px; }
        p { line-height: 1.6; }
        .btn { 
            background: #64ffda; 
            color: #0a192f; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 4px; 
            font-weight: bold; 
            display: inline-block; 
            margin-top: 20px; 
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(100, 255, 218, 0.2); }
        .loader-bar {
            width: 100%; height: 3px; background: #233554; margin-top: 30px; overflow: hidden; border-radius: 10px;
        }
        .progress {
            height: 100%; background: #64ffda; width: 0%; animation: load 5s linear forwards;
        }
        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 60px; margin-bottom: 10px;">📄✅</div>
        <h1>¡Certificación Lista!</h1>
        <p>Gracias por confiar en <strong>Bitcopper Tech Spa</strong>.</p>
        <p>Tu informe técnico <strong>LOD 400</strong> con código de validación QR se ha generado correctamente.</p>
        
        <a id="downloadLink" href="http://127.0.0.1:8000/descargar-reporte/ultimo_reporte.pdf" class="btn" download="Certificado_LOD400_Bitcopper.pdf">
            DESCARGAR CERTIFICADO PDF
        </a>

        <div class="loader-bar"><div class="progress"></div></div>
        <p style="font-size: 0.8em; color: #8892b0; margin-top: 15px;">La descarga automática iniciará en breve...</p>
        
        <br>
        <a href="index.html" style="color: #64ffda; text-decoration: none; font-size: 0.8em; opacity: 0.7;">Ir al Dashboard</a>
    </div>

    <script>
        // Inicia la descarga automática tras 5 segundos
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('downloadLink').click();
            }, 5000);
        };
    </script>
</body>
</html>
